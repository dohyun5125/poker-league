const swCode = `
const CACHE = "poker-v2";
self.addEventListener("install", e => {
  self.skipWaiting();
});
self.addEventListener("activate", e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener("fetch", e => {
  if (e.request.url.startsWith('chrome-extension')) return;
  e.respondWith(
    caches.open(CACHE).then(cache =>
      cache.match(e.request).then(cached => {
        const fetched = fetch(e.request).then(res => {
          if (res && res.status === 200 && e.request.method === 'GET') {
            cache.put(e.request, res.clone());
          }
          return res;
        }).catch(() => cached);
        return cached || fetched;
      })
    )
  );
});
`;
if ('serviceWorker' in navigator) {
  const swBlob = new Blob([swCode], {type:'text/javascript'});
  const swUrl  = URL.createObjectURL(swBlob);

<script type="text/babel">
const{useState,useEffect}=React;

const DEFAULT_FEE=2000;
const fmt=n=>(n>=0?`+${n.toLocaleString()}`:`${n.toLocaleString()}`)+'원';
const fmtAbs=n=>n.toLocaleString()+'원';
const roi=(p,i)=>i===0?'0%':`${((p/i)*100).toFixed(1)}%`;
const avgRank=r=>r.length===0?'-':(r.reduce((a,b)=>a+b,0)/r.length).toFixed(2);

const C={bg:'#0d1a12',surface:'#132019',card:'#1a2d22',border:'#2a4433',
  gold:'#c9a84c',goldLight:'#e8c97a',green:'#3a7d5a',greenLight:'#4fa874',
  text:'#e8ded0',muted:'#8fa898',red:'#c94c4c',blue:'#4c8bc9',purple:'#8b6cc9',
  rank1:'#c9a84c',rank2:'#9ca8b8',rank3:'#b87a4c',rank4:'#6a7a6a'};
const RC=r=>[C.rank1,C.rank2,C.rank3,C.rank4][r-1]||C.muted;
const suit=['♠','♥','♦','♣'];

// ── 칭호 시스템 ──────────────────────────────────────────────────────────
function getTitles(player, stats, games, players) {
  const s=stats[player];
  if(!s||s.games===0)return[];
  const t=[];
  const prank=[...players].sort((a,b)=>stats[b].profit-stats[a].profit).indexOf(player);
  if(prank===0&&s.profit>0)t.push({icon:'💰',label:'머니메이커',color:C.gold,desc:'누적 순수익 1위'});
  if(s.profit<0&&prank===players.length-1)t.push({icon:'🐟',label:'피쉬',color:C.red,desc:'누적 손실 꼴찌'});
  if(s.wins>=3)t.push({icon:'🏆',label:'챔피언',color:C.gold,desc:`${s.wins}회 우승`});
  if(s.wins/s.games>=0.5&&s.games>=4)t.push({icon:'👑',label:'지배자',color:C.goldLight,desc:'우승률 50% 이상'});
  const hut=s.headsupWins+s.headsupLosses,hur=hut>0?s.headsupWins/hut:0;
  if(hur>=0.7&&hut>=3)t.push({icon:'⚔️',label:'헤즈업킹',color:C.greenLight,desc:'헤즈업 승률 70%+'});
  if(hur<=0.3&&hut>=3)t.push({icon:'🏳️',label:'헤즈업약자',color:C.red,desc:'헤즈업 승률 30% 이하'});
  // 현재 연속 우승
  let cs=0,lastW=null;
  for(const g of [...games].sort((a,b)=>a.date.localeCompare(b.date)||a.gameNum-b.gameNum)){
    const w=g.players.find(p=>p.rank===1);if(!w)continue;
    if(w.name===player)cs++;else cs=0;lastW=w.name;
  }
  if(lastW===player&&cs>=3)t.push({icon:'🔥',label:'핫스트릭',color:'#ff6b35',desc:`${cs}연속 우승 중`});
  if(s.games>0&&s.rebuys/s.games>=1.5)t.push({icon:'♻️',label:'리바이왕',color:C.muted,desc:'경기당 평균 1.5회+ 리바이'});
  if(s.ranks.length>=4){
    const rng=Math.max(...s.ranks)-Math.min(...s.ranks);
    if(rng<=1)t.push({icon:'🎯',label:'철벽수비',color:C.blue,desc:'순위 변동폭 1 이하'});
    if(rng>=3)t.push({icon:'🎲',label:'롤러코스터',color:C.purple,desc:'순위 변동폭 최대'});
  }
  const mg=[...players].sort((a,b)=>stats[b].games-stats[a].games)[0];
  if(mg===player&&s.games>=5)t.push({icon:'🃏',label:'포커홀릭',color:C.greenLight,desc:'최다 참가'});
  return t;
}

function computeStats(games,players){
  const s={};
  for(const p of players)s[p]={games:0,wins:0,totalInvested:0,totalPrize:0,ranks:[],rebuys:0,headsupWins:0,headsupLosses:0,profit:0};
  for(const g of games){
    const fee=g.entryFee||DEFAULT_FEE;
    const pot=g.players.reduce((a,p)=>a+(1+p.rebuys)*fee,0);
    for(const p of g.players){
      if(!s[p.name])continue;
      const x=s[p.name];x.games++;x.rebuys+=p.rebuys;x.ranks.push(p.rank);
      const inv=(1+p.rebuys)*fee;x.totalInvested+=inv;
      if(p.rank===1){x.wins++;x.totalPrize+=pot;x.headsupWins++;}
      if(p.rank===2)x.headsupLosses++;
    }
  }
  for(const p of players)s[p].profit=s[p].totalPrize-s[p].totalInvested;
  return s;
}

function oppRecs(games,players){
  const r={};
  for(const a of players){r[a]={};for(const b of players)if(a!==b)r[a][b]={wins:0,total:0};}
  for(const g of games){
    const ps=g.players;
    for(let i=0;i<ps.length;i++)for(let j=0;j<ps.length;j++){
      if(i===j)continue;const a=ps[i].name,b=ps[j].name;
      if(!r[a]||!r[a][b])continue;r[a][b].total++;
      if(ps[i].rank<ps[j].rank)r[a][b].wins++;
    }
  }
  return r;
}

function Card({children,style={}}){return <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:20,...style}}>{children}</div>;}
function ST({children}){return <div style={{fontFamily:"'Cinzel',serif",fontSize:15,color:C.gold,letterSpacing:2,textTransform:'uppercase',marginBottom:16,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>{children}</div>;}
const BV={primary:{background:C.green,color:'#fff'},ghost:{background:'none',border:`1px solid ${C.border}`,color:C.muted},danger:{background:C.red+'22',border:`1px solid ${C.red}55`,color:C.red},gold:{background:C.gold+'22',border:`1px solid ${C.gold}55`,color:C.gold}};
function Btn({children,onClick,variant='primary',style={}}){return <button onClick={onClick} style={{border:'none',borderRadius:7,padding:'11px 18px',fontSize:15,fontWeight:600,cursor:'pointer',...BV[variant],...style}}>{children}</button>;}

// ── SVG 꺾은선 그래프 ────────────────────────────────────────────────────
function LineChart({series,colors}){
  if(!series||!series.length||!series[0].data.length)return null;
  const W=300,H=150,PL=44,PR=10,PT=10,PB=26;
  const IW=W-PL-PR,IH=H-PT-PB;
  const allY=series.flatMap(s=>s.data.map(d=>d.y));
  const minY=Math.min(...allY),maxY=Math.max(...allY);
  const rng=maxY-minY||1;
  const n=series[0].data.length;
  const xOf=i=>PL+i*(IW/(n-1||1));
  const yOf=v=>PT+IH-((v-minY)/rng)*IH;
  const ticks=[minY,(minY+maxY)/2,maxY];
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
      {minY<0&&maxY>0&&<line x1={PL} x2={PL+IW} y1={yOf(0)} y2={yOf(0)} stroke={C.border} strokeWidth="1" strokeDasharray="3,3"/>}
      {ticks.map((t,i)=>(
        <g key={i}>
          <line x1={PL-3} x2={PL} y1={yOf(t)} y2={yOf(t)} stroke={C.border} strokeWidth="1"/>
          <text x={PL-5} y={yOf(t)+4} textAnchor="end" fontSize="9" fill={C.muted}>{Math.abs(t)>=1000?`${(t/1000).toFixed(1)}k`:t}</text>
        </g>
      ))}
      {series[0].data.map((d,i)=>(
        <text key={i} x={xOf(i)} y={H-4} textAnchor="middle" fontSize="9" fill={C.muted}>{d.x}</text>
      ))}
      {series.map((s,si)=>{
        const pts=s.data.map((d,i)=>`${xOf(i)},${yOf(d.y)}`).join(' ');
        const fill=`${xOf(0)},${yOf(0)} ${s.data.map((d,i)=>`${xOf(i)},${yOf(d.y)}`).join(' ')} ${xOf(n-1)},${yOf(0)}`;
        return(
          <g key={si}>
            <polygon points={fill} fill={colors[si]+'1a'}/>
            <polyline points={pts} fill="none" stroke={colors[si]} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
            {s.data.map((d,i)=><circle key={i} cx={xOf(i)} cy={yOf(d.y)} r="3" fill={colors[si]} stroke={C.card} strokeWidth="1.5"/>)}
          </g>
        );
      })}
    </svg>
  );
}

// ── 서브탭 컴포넌트 ──────────────────────────────────────────────────────
function SubTabs({tabs,active,setActive}){
  return(
    <div className="ns" style={{display:'flex',overflowX:'auto',gap:4,marginBottom:16,WebkitOverflowScrolling:'touch'}}>
      {tabs.map(([id,lbl])=>(
        <button key={id} onClick={()=>setActive(id)}
          style={{flexShrink:0,padding:'7px 14px',borderRadius:20,border:'none',
            background:active===id?C.gold:C.surface,
            color:active===id?C.bg:C.muted,
            fontSize:12,fontWeight:active===id?700:400,cursor:'pointer',
            transition:'all 0.15s'}}>
          {lbl}
        </button>
      ))}
    </div>
  );
}

// ── 그룹 유틸 ────────────────────────────────────────────────────────────
function loadGroups(){try{return JSON.parse(localStorage.getItem('poker_group_list')||'[]');}catch{return[];}}
function saveGroups(g){localStorage.setItem('poker_group_list',JSON.stringify(g));}
function loadGroupData(gid){try{return JSON.parse(localStorage.getItem(`poker_data_${gid}`)||'null');}catch{return null;}}
function saveGroupData(gid,data){localStorage.setItem(`poker_data_${gid}`,JSON.stringify(data));}
function newGroupId(){return 'g'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ── 그룹 모달 본문 (재사용 가능) ──────────────────────────────────────────
function GroupModalBody({onSelect}){
  const[groups,setGroups]=useState(()=>loadGroups());
  const[editId,setEditId]=useState(null);
  const[editName,setEditName]=useState('');
  const[newName,setNewName]=useState('');

  const persist=g=>{setGroups(g);saveGroups(g);};

  const addGroup=()=>{
    const n=newName.trim();
    if(!n)return;
    if(groups.find(g=>g.name===n)){alert('같은 이름의 그룹이 있습니다.');return;}
    const ng={id:newGroupId(),name:n};
    const next=[...groups,ng];
    persist(next);
    setNewName('');
  };
  const startEdit=(g)=>{setEditId(g.id);setEditName(g.name);};
  const saveEdit=()=>{
    const n=editName.trim();
    if(!n){setEditId(null);return;}
    if(groups.find(g=>g.id!==editId&&g.name===n)){alert('같은 이름의 그룹이 있습니다.');return;}
    persist(groups.map(g=>g.id===editId?{...g,name:n}:g));
    setEditId(null);
  };
  const delGroup=(id,name)=>{
    if(!confirm(`"${name}" 그룹을 삭제할까요?\n⚠️ 해당 그룹의 모든 경기 기록도 함께 삭제됩니다.`))return;
    localStorage.removeItem(`poker_data_${id}`);
    persist(groups.filter(g=>g.id!==id));
  };

  return(
    <>
      {/* 그룹 목록 */}
      <div style={{padding:'12px 20px',display:'flex',flexDirection:'column',gap:8}}>
        {groups.length===0&&(
          <div style={{textAlign:'center',color:C.muted,fontSize:13,padding:'24px 0'}}>
            <div style={{fontSize:36,marginBottom:10}}>🃏</div>
            그룹이 없습니다.<br/>아래에서 첫 그룹을 만들어보세요!
          </div>
        )}
        {groups.map(g=>(
          <div key={g.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px',display:'flex',alignItems:'center',gap:8}}>
            {editId===g.id?(
              <>
                <input autoFocus value={editName} onChange={e=>setEditName(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')saveEdit();if(e.key==='Escape')setEditId(null);}}
                  style={{flex:1,background:C.card,border:`1px solid ${C.gold}`,borderRadius:6,padding:'6px 10px',color:C.text,fontSize:14}}/>
                <Btn onClick={saveEdit} style={{padding:'6px 14px',fontSize:12}}>저장</Btn>
                <Btn variant="ghost" onClick={()=>setEditId(null)} style={{padding:'6px 10px',fontSize:12}}>취소</Btn>
              </>
            ):(
              <>
                <button onClick={()=>onSelect(g)}
                  style={{flex:1,textAlign:'left',background:'none',border:'none',color:C.text,fontSize:15,fontWeight:600,cursor:'pointer',padding:0,display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:18}}>🃏</span>
                  <div>
                    <div>{g.name}</div>
                    <div style={{fontSize:11,color:C.muted,fontWeight:400,marginTop:1}}>
                      {(()=>{const d=loadGroupData(g.id);return d?`${(d.games||[]).length}경기 · ${(d.players||[]).length}명`:'비어있음';})()}
                    </div>
                  </div>
                </button>
                <Btn variant="gold" onClick={()=>startEdit(g)} style={{padding:'5px 10px',fontSize:11}}>수정</Btn>
                <Btn variant="danger" onClick={()=>delGroup(g.id,g.name)} style={{padding:'5px 8px',fontSize:11}}>삭제</Btn>
              </>
            )}
          </div>
        ))}
      </div>

      {/* 새 그룹 추가 */}
      <div style={{padding:'0 20px 20px',borderTop:`1px solid ${C.border}`,paddingTop:14}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:8,letterSpacing:1}}>새 그룹 추가</div>
        <div style={{display:'flex',gap:8}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')addGroup();}}
            placeholder="그룹 이름 (예: 금요 모임)"
            style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'9px 12px',color:C.text,fontSize:14}}/>
          <Btn onClick={addGroup} style={{padding:'9px 18px'}}>추가</Btn>
        </div>
      </div>
    </>
  );
}

function App(){
  // ── 그룹 상태 ──────────────────────────────────────────────────────────
  const[showGroupModal,setShowGroupModal]=useState(true);
  const[modalKey,setModalKey]=useState(0);
  const openGroupModal=()=>{setModalKey(k=>k+1);setShowGroupModal(true);};
  const[currentGroup,setCurrentGroup]=useState(null); // {id, name}

  // ── 그룹별 데이터 상태 ────────────────────────────────────────────────
  const[games,setGames]=useState([]);
  const[players,setPlayers]=useState([]);
  const[defaultFee,setDefaultFee]=useState(DEFAULT_FEE);

  // 그룹 데이터 저장 (currentGroup이 있을 때만, 로딩 중 아닐 때만)
  const{useRef}=React;
  const loadingRef=useRef(false);
  useEffect(()=>{
    if(!currentGroup||loadingRef.current)return;
    saveGroupData(currentGroup.id,{games,players,defaultFee});
  },[games,players,defaultFee]);

  // 그룹 선택 시 해당 그룹 데이터 로드
  const selectGroup=(group)=>{
    loadingRef.current=true;
    setCurrentGroup(group);
    setShowGroupModal(false);
    const d=loadGroupData(group.id);
    setGames(d?.games||[]);
    setPlayers(d?.players||[]);
    setDefaultFee(d?.defaultFee||DEFAULT_FEE);
    setTab('home');
    setFlow(null);
    setTimeout(()=>{loadingRef.current=false;},80);
  };

  // tab: 'home' | 'rank' | 'games' | 'settle' | 'settings'
  const[tab,setTab]=useState('home');
  // global title tooltip: {player, idx} | null
  const[titleTooltip,setTitleTooltip]=useState(null);
  const toggleTitleTip=(player,idx,e)=>{e.stopPropagation();setTitleTooltip(prev=>(prev&&prev.player===player&&prev.idx===idx)?null:{player,idx});};
  useEffect(()=>{const h=()=>setTitleTooltip(null);document.addEventListener('click',h);return()=>document.removeEventListener('click',h);},[]);
  // subview for special full-screen flows
  const[flow,setFlow]=useState(null); // null | 'add' | 'edit' | 'result'
  const[addForm,setAddForm]=useState(null);
  const[lastResult,setLastResult]=useState(null);
  const[editIdx,setEditIdx]=useState(null);
  const stats=computeStats(games,players);
  const opp=oppRecs(games,players);
  const allStats=computeStats(games,players);

  const openAdd=(base)=>{
    const g=base||games,today=new Date().toISOString().slice(0,10);
    const cnt=g.filter(x=>x.date===today).length;
    setAddForm({date:today,gameNum:cnt+1,entryFee:defaultFee,activePlayers:[...players],players:players.map(n=>({name:n,rank:0,rebuys:0})),note:''});
    setFlow('add');
  };
  const openEdit=(idx)=>{
    const g=games[idx];
    const allNames=[...new Set([...players,...g.players.map(p=>p.name)])];
    setEditIdx(idx);
    setAddForm({
      date:g.date,gameNum:g.gameNum,entryFee:g.entryFee||DEFAULT_FEE,
      activePlayers:g.players.map(p=>p.name),
      players:allNames.map(n=>{const ex=g.players.find(p=>p.name===n);return ex?{...ex}:{name:n,rank:0,rebuys:0};}),
      note:g.note||''
    });
    setFlow('edit');
  };
  const submitGame=()=>{
    const active=addForm.players.filter(p=>addForm.activePlayers.includes(p.name));
    const ranks=active.map(p=>p.rank);
    if(ranks.some(r=>r===0)){alert('모든 플레이어의 순위를 입력해주세요.');return;}
    if(new Set(ranks).size!==ranks.length){alert('중복 순위가 있습니다.');return;}
    const ng={date:addForm.date,gameNum:addForm.gameNum,entryFee:addForm.entryFee,players:active,note:addForm.note};
    setGames(prev=>[...prev,ng]);setLastResult(ng);setFlow('result');
  };
  const submitEdit=()=>{
    const active=addForm.players.filter(p=>addForm.activePlayers.includes(p.name));
    const ranks=active.map(p=>p.rank);
    if(ranks.some(r=>r===0)){alert('모든 플레이어의 순위를 입력해주세요.');return;}
    if(new Set(ranks).size!==ranks.length){alert('중복 순위가 있습니다.');return;}
    const ng={date:addForm.date,gameNum:addForm.gameNum,entryFee:addForm.entryFee,players:active,note:addForm.note};
    setGames(prev=>prev.map((g,i)=>i===editIdx?ng:g));
    setFlow(null);setTab('games');
  };
  const delGame=idx=>{if(!confirm('이 경기를 삭제할까요?'))return;setGames(g=>g.filter((_,i)=>i!==idx));};

  // bottom nav items
  const navItems=[
    ['home','홈','🏠'],
    ['rank','순위','🏆'],
    ['games','경기','🃏'],
    ['settle','정산','💳'],
    ['settings','설정','⚙️'],
  ];

  return(
    <div style={{minHeight:'100vh',background:C.bg,color:C.text,fontFamily:"'Inter',sans-serif"}}>
      <style>{`
        input:focus,select:focus,textarea:focus{outline:none;border-color:${C.gold}!important}
        *{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:${C.bg}}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px}
        input,select,textarea,button{font-family:'Inter',sans-serif}
        table td,table th{white-space:nowrap;font-size:14px}
        .ns::-webkit-scrollbar{display:none}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .fade{animation:fadeIn 0.18s ease}
        @keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .modal-in{animation:modalIn 0.2s cubic-bezier(0.34,1.2,0.64,1)}
        @keyframes tooltipIn{from{opacity:0;transform:translateY(4px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        .tooltip-pop{animation:tooltipIn 0.15s cubic-bezier(0.34,1.56,0.64,1)}
        button,label[style*="cursor:pointer"]{transition:opacity 0.15s ease,transform 0.15s ease,background 0.18s ease,border-color 0.18s ease,color 0.18s ease,box-shadow 0.18s ease!important}
        button:hover:not(:disabled){opacity:0.88;transform:translateY(-1px)}
        button:active:not(:disabled){opacity:1;transform:scale(0.96) translateY(0)!important;transition-duration:0.08s!important}
        button:focus-visible{outline:2px solid ${C.gold};outline-offset:2px}
        div[style*="cursor:pointer"]{transition:background 0.18s ease,border-color 0.18s ease,opacity 0.15s ease,transform 0.15s ease!important}
        div[style*="cursor:pointer"]:hover{opacity:0.9;transform:translateY(-1px)}
        div[style*="cursor:pointer"]:active{transform:scale(0.97)!important;transition-duration:0.08s!important}
        input[type="checkbox"]{transition:transform 0.15s ease!important}
        input[type="checkbox"]:active{transform:scale(0.85)!important}
        .title-badge{transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.18s ease,opacity 0.15s ease!important}
        .title-badge:hover{transform:translateY(-2px) scale(1.06)!important;box-shadow:0 4px 12px #0004!important}
        .title-badge:active{transform:scale(0.94)!important;transition-duration:0.08s!important}
        .nav-btn{transition:color 0.18s ease,transform 0.15s ease!important}
        .nav-btn:active{transform:scale(0.88)!important}
      `}</style>

      {/* 그룹 모달 */}
      {showGroupModal&&(
        <div style={{position:'fixed',inset:0,zIndex:200,background:'#000b',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div className="modal-in" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,width:'100%',maxWidth:420,maxHeight:'85vh',overflowY:'auto',boxShadow:'0 8px 40px #000a'}}>
            {/* 모달 헤더 */}
            <div style={{padding:'22px 20px 14px',borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:700,color:C.gold,letterSpacing:2,marginBottom:4}}>POKER LEAGUE</div>
              <div style={{fontSize:13,color:C.muted}}>그룹을 선택하거나 새로 만드세요</div>
            </div>
            <GroupModalBody key={modalKey} onSelect={selectGroup}/>
          </div>
        </div>
      )}

      {/* 헤더 */}
      <div style={{position:'sticky',top:0,zIndex:50,background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {flow&&(
            <button onClick={()=>setFlow(null)} style={{background:'none',border:'none',color:C.muted,fontSize:20,cursor:'pointer',padding:'0 4px',lineHeight:1}}>‹</button>
          )}
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:16,fontWeight:700,color:C.gold,letterSpacing:2,lineHeight:1}}>POKER LEAGUE</div>
            {currentGroup&&<div style={{fontSize:11,color:C.muted,letterSpacing:1,marginTop:1}}>
              <span style={{color:C.goldLight,fontWeight:600}}>🃏 {currentGroup.name}</span>
              <span style={{marginLeft:6}}>{games.length}경기 · {players.length}명</span>
            </div>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={openGroupModal} style={{background:'none',border:`1px solid ${C.border}`,color:C.muted,borderRadius:7,padding:'6px 12px',fontSize:12,fontWeight:500,cursor:'pointer'}}>그룹 변경</button>
          <button onClick={()=>openAdd()} style={{background:C.green,border:'none',color:'#fff',borderRadius:8,padding:'8px 16px',fontSize:13,fontWeight:700,cursor:'pointer',letterSpacing:0.5}}>＋ 경기 추가</button>
        </div>
      </div>

      {/* 메인 콘텐츠 */}
      <main style={{maxWidth:900,margin:'0 auto',padding:'16px 14px 90px'}}>
        <div key={flow||tab} className="fade">
          {flow==='add'    && addForm && <AddV form={addForm} setForm={setAddForm} submit={submitGame} cancel={()=>setFlow(null)} players={players} games={games}/>}
          {flow==='edit'   && addForm && <AddV form={addForm} setForm={setAddForm} submit={submitEdit} cancel={()=>setFlow(null)} players={players} games={games} isEdit={true}/>}
          {flow==='result' && lastResult && <ResV game={lastResult} allStats={allStats} players={players} back={()=>{setFlow(null);setTab('rank');}} addAnother={()=>openAdd(games)}/>}
          {!flow&&tab==='home'     && <HomeV games={games} stats={stats} players={players} openAdd={()=>openAdd()} titleTooltip={titleTooltip} toggleTitleTip={toggleTitleTip}/>}
          {!flow&&tab==='rank'     && <RankHub stats={stats} games={games} players={players} opp={opp} titleTooltip={titleTooltip} toggleTitleTip={toggleTitleTip}/>}
          {!flow&&tab==='games'    && <GamesHub games={games} players={players} stats={stats} opp={opp} delGame={delGame} openEdit={openEdit}/>}
          {!flow&&tab==='settle'   && <SettleV games={games} players={players}/>}
          {!flow&&tab==='settings' && <SettV players={players} setPlayers={setPlayers} games={games} setGames={setGames} defaultFee={defaultFee} setDefaultFee={setDefaultFee} currentGroup={currentGroup} loadingRef={loadingRef}/>}
        </div>
      </main>

      {/* 하단 탭 바 */}
      {!flow&&(
        <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:50,background:C.surface,borderTop:`1px solid ${C.border}`,display:'flex',padding:'6px 0 max(6px,env(safe-area-inset-bottom))'}}>
          {navItems.map(([id,lbl,ic])=>(
            <button key={id} onClick={()=>setTab(id)} className="nav-btn" style={{flex:1,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 0',color:tab===id?C.gold:C.muted,transition:'color 0.15s'}}>
              <span style={{fontSize:18,lineHeight:1}}>{ic}</span>
              <span style={{fontSize:10,fontWeight:tab===id?700:400,letterSpacing:0.5}}>{lbl}</span>
              {tab===id&&<div style={{position:'absolute',top:0,width:28,height:2,background:C.gold,borderRadius:1}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── 순위 허브 (순위 / 기간별 / 기록실 / 플레이어) ────────────────────────
function RankHub({stats,games,players,opp,titleTooltip,toggleTitleTip}){
  const[sub,setSub]=useState('overall');
  const tabs=[['overall','종합순위'],['season','기간별'],['records','기록실'],['player','플레이어']];
  return(
    <div>
      <SubTabs tabs={tabs} active={sub} setActive={setSub}/>
      <div key={sub} className="fade">
        {sub==='overall' && <StandV stats={stats} players={players} games={games} titleTooltip={titleTooltip} toggleTitleTip={toggleTitleTip}/>}
        {sub==='season'  && <SeasonV games={games} players={players}/>}
        {sub==='records' && <RecV games={games} stats={stats} players={players}/>}
        {sub==='player'  && <SearchV stats={stats} games={games} opp={opp} players={players} titleTooltip={titleTooltip} toggleTitleTip={toggleTitleTip}/>}
      </div>
    </div>
  );
}

// ── 경기 허브 (경기기록 / 그래프 / 상대전적 / 헤즈업) ──────────────────
function GamesHub({games,players,stats,opp,delGame,openEdit}){
  const[sub,setSub]=useState('history');
  const tabs=[['history','경기기록'],['chart','그래프'],['opponent','상대전적'],['headsup','헤즈업'],['league','리그요약']];
  return(
    <div>
      <SubTabs tabs={tabs} active={sub} setActive={setSub}/>
      <div key={sub} className="fade">
        {sub==='history'  && <HistV games={games} delGame={delGame} openEdit={openEdit}/>}
        {sub==='chart'    && <ChartV games={games} players={players} stats={stats}/>}
        {sub==='opponent' && <OppV opp={opp} players={players}/>}
        {sub==='headsup'  && <HUV stats={stats} players={players}/>}
        {sub==='league'   && <LeagueV games={games} stats={stats} players={players}/>}
      </div>
    </div>
  );
}

function HomeV({games,stats,players,openAdd,titleTooltip,toggleTitleTip}){
  const sorted=[...players].sort((a,b)=>stats[b].profit-stats[a].profit);
  const last=games[games.length-1];
  const totInv=games.reduce((s,g)=>s+g.players.reduce((ss,p)=>ss+(1+p.rebuys)*(g.entryFee||DEFAULT_FEE),0),0);

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* 통계 요약 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
        {[['총 경기',games.length+'경기','🎮'],['참가자',players.length+'명','👤'],['총 투자금',fmtAbs(totInv),'💰']].map(([l,v,ic])=>(
          <Card key={l} style={{textAlign:'center',padding:'14px 8px'}}>
            <div style={{fontSize:18,marginBottom:4}}>{ic}</div>
            <div style={{fontSize:16,fontWeight:700,color:C.goldLight,marginBottom:2}}>{v}</div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:1}}>{l}</div>
          </Card>
        ))}
      </div>

      {/* 순수익 리더보드 + 칭호 말풍선 */}
      <Card>
        <ST>리더보드</ST>
        {sorted.length===0?<div style={{color:C.muted,fontSize:13,textAlign:'center',padding:20}}>플레이어가 없습니다.</div>:(
          <div style={{display:'flex',flexDirection:'column',gap:0}}>
            {sorted.map((p,i)=>{
              const s=stats[p];

                          {titleTooltip&&titleTooltip.player===p&&titleTooltip.idx===ti&&(
                            <div className="tooltip-pop" onClick={e=>e.stopPropagation()} style={{
                              position:'absolute',bottom:'calc(100% + 6px)',left:0,zIndex:100,
                              background:C.card,border:`1px solid ${t.color}66`,borderRadius:10,
                              padding:'10px 12px',minWidth:160,maxWidth:220,
                              boxShadow:'0 4px 20px #0006',
                            }}>
                              {/* 꼭짓점 삼각형 */}
                              <div style={{position:'absolute',bottom:-6,left:14,width:10,height:6,overflow:'hidden'}}>
                                <div style={{width:10,height:10,background:C.card,border:`1px solid ${t.color}66`,transform:'rotate(45deg)',transformOrigin:'top left'}}/>
                              </div>
                              <div style={{fontSize:16,marginBottom:4}}>{t.icon} <span style={{fontWeight:700,color:t.color,fontSize:13}}>{t.label}</span></div>
                              <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>{t.desc}</div>
                            </div>

                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </Card>

      {/* 최근 경기 */}
      {last&&(
        <Card>
          <ST>최근 경기 — {last.date} / 게임 {last.gameNum}</ST>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {[...last.players].sort((a,b)=>a.rank-b.rank).map(p=>(
              <div key={p.name} style={{flex:1,minWidth:65,background:C.surface,borderRadius:8,padding:'10px 6px',textAlign:'center',borderTop:`2px solid ${RC(p.rank)}`}}>
                <div style={{fontSize:19,fontWeight:700,color:RC(p.rank)}}>{p.rank}위</div>
                <div style={{fontSize:14,fontWeight:500,marginTop:3}}>{p.name}</div>
                {p.rebuys>0&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>↻{p.rebuys}</div>}
              </div>
            ))}
          </div>
        </Card>
      )}

      {games.length===0&&(
        <Card style={{textAlign:'center',padding:44}}>
          <div style={{fontSize:44,marginBottom:14}}>🃏</div>
          <div style={{color:C.muted,marginBottom:18,fontSize:14}}>아직 경기 기록이 없습니다</div>

      )}
    </div>
  );
}

function ChartV({games,players,stats}){
  const[tab,setTab]=useState('profit');
  const[selPlayers,setSelPlayers]=useState(()=>new Set(players));
  const COLS=[C.gold,C.greenLight,C.blue,C.purple,C.red,'#ff9f40'];

  // players prop이 바뀌면 선택 동기화
  useEffect(()=>{setSelPlayers(new Set(players));},[players.join(',')]);

  const togglePlayer=name=>setSelPlayers(prev=>{
    const n=new Set(prev);
    if(n.has(name)){if(n.size===1)return prev;n.delete(name);}
    else n.add(name);
    return n;
  });
  const allSel=selPlayers.size===players.length;
  const toggleAll=()=>setSelPlayers(allSel?new Set([players[0]]):new Set(players));

  if(games.length<2)return<Card><div style={{color:C.muted,textAlign:'center',padding:40}}>경기가 2개 이상 있어야 그래프를 볼 수 있습니다.</div></Card>;

  const sg=[...games].sort((a,b)=>a.date.localeCompare(b.date)||a.gameNum-b.gameNum);
  // 색상은 전체 players 기준 index로 고정 (필터해도 색 안 바뀜)
  const colorOf=p=>COLS[players.indexOf(p)%COLS.length];

  const profitS=players.map(p=>{let c=0;return{name:p,data:sg.map((g,i)=>{const fee=g.entryFee||DEFAULT_FEE,pot=g.players.reduce((s,x)=>s+(1+x.rebuys)*fee,0),me=g.players.find(x=>x.name===p);if(me){const inv=(1+me.rebuys)*fee;c+=me.rank===1?pot-inv:-inv;}return{x:`G${i+1}`,y:c};})};});
  const winS=players.map(p=>{let w=0;return{name:p,data:sg.map((g,i)=>{const me=g.players.find(x=>x.name===p);if(me&&me.rank===1)w++;return{x:`G${i+1}`,y:w};})};});
  const rankS=players.map(p=>{const data=sg.map((g,i)=>{const me=g.players.find(x=>x.name===p);return me?{x:`G${i+1}`,y:me.rank}:null;}).filter(Boolean);return{name:p,data};});
  const smAll={profit:profitS,wins:winS,rank:rankS};

  const filteredSeries=smAll[tab].filter(s=>selPlayers.has(s.name));
  const filteredColors=filteredSeries.map(s=>colorOf(s.name));

  const tabs=[['profit','순수익 추이'],['wins','우승 누적'],['rank','순위 추이']];
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* 그래프 타입 선택 */}
      <Card style={{padding:'10px 12px'}}>
        <div style={{display:'flex',gap:6}}>{tabs.map(([id,lbl])=><button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'8px 4px',background:tab===id?C.green:C.surface,border:`1px solid ${tab===id?C.green:C.border}`,borderRadius:6,color:tab===id?'#fff':C.muted,fontSize:12,fontWeight:tab===id?600:400,cursor:'pointer'}}>{lbl}</button>)}</div>
      </Card>

      {/* 플레이어 필터 */}
      <Card style={{padding:'12px 14px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <span style={{fontSize:12,color:C.muted,fontWeight:500}}>플레이어 선택</span>
          <button onClick={toggleAll} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:12,padding:'3px 10px',fontSize:11,color:allSel?C.gold:C.muted,cursor:'pointer',fontWeight:allSel?700:400}}>
            {allSel?'✓ 전체':'전체 선택'}
          </button>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {players.map(p=>{
            const on=selPlayers.has(p);
            const col=colorOf(p);
            return(
              <button key={p} onClick={()=>togglePlayer(p)}
                style={{padding:'5px 12px',borderRadius:20,border:`1px solid ${on?col:C.border}`,
                  background:on?col+'22':'transparent',
                  color:on?col:C.muted,fontSize:12,fontWeight:on?700:400,cursor:'pointer',
                  display:'flex',alignItems:'center',gap:5,transition:'all 0.12s'}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:on?col:C.border,flexShrink:0}}/>
                {p}
              </button>
            );
          })}
        </div>
      </Card>

      {/* 그래프 */}
      <Card>
        <ST>{tabs.find(t=>t[0]===tab)[1]}</ST>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12}}>
          {filteredSeries.map((s,i)=>(
            <div key={s.name} style={{display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:16,height:3,background:filteredColors[i],borderRadius:2}}/>
              <span style={{fontSize:11,color:C.muted}}>{s.name}</span>
            </div>
          ))}
        </div>
        {filteredSeries.length>0
          ?<LineChart series={filteredSeries} colors={filteredColors}/>
          :<div style={{color:C.muted,textAlign:'center',padding:30,fontSize:13}}>플레이어를 1명 이상 선택해주세요.</div>
        }
        {tab==='rank'&&<div style={{fontSize:10,color:C.muted,marginTop:8,textAlign:'center'}}>※ 숫자가 낮을수록 높은 순위</div>}
      </Card>

      {/* 선택된 플레이어 스탯 카드 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>
        {players.filter(p=>selPlayers.has(p)).map(p=>{
          const s=stats[p];const col=colorOf(p);
          return(
            <Card key={p} style={{padding:'12px 14px',borderLeft:`3px solid ${col}`}}>
              <div style={{fontWeight:600,marginBottom:6,fontSize:13}}>{p}</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3,fontSize:12}}>
                <span style={{color:C.muted}}>순수익</span><span style={{color:s.profit>=0?C.greenLight:C.red,fontWeight:600}}>{fmt(s.profit)}</span>
                <span style={{color:C.muted}}>ROI</span><span style={{color:s.profit>=0?C.greenLight:C.red}}>{roi(s.profit,s.totalInvested)}</span>
                <span style={{color:C.muted}}>우승</span><span style={{color:C.gold}}>{s.wins}회</span>
                <span style={{color:C.muted}}>평균순위</span><span style={{color:C.text}}>{avgRank(s.ranks)}</span>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ── 기간별 순위 (시즌) ────────────────────────────────────────────────────
function SeasonV({games,players}){
  const[period,setPeriod]=useState('month1');
  const now=new Date();
  const filterGames=(p)=>{
    const sg=[...games].sort((a,b)=>a.date.localeCompare(b.date)||a.gameNum-b.gameNum);
    if(p==='last5') return sg.slice(-5);
    if(p==='last10') return sg.slice(-10);
    if(p==='last20') return sg.slice(-20);
    if(p==='month1'){
      const cut=new Date(now);cut.setMonth(cut.getMonth()-1);
      return sg.filter(g=>new Date(g.date)>=cut);
    }
    if(p==='month3'){
      const cut=new Date(now);cut.setMonth(cut.getMonth()-3);
      return sg.filter(g=>new Date(g.date)>=cut);
    }
    if(p==='month6'){
      const cut=new Date(now);cut.setMonth(cut.getMonth()-6);
      return sg.filter(g=>new Date(g.date)>=cut);
    }
    return sg;
  };
  const filtered=filterGames(period);
  const stats=computeStats(filtered,players);
  const sorted=[...players].sort((a,b)=>stats[b].profit-stats[a].profit);
  const tabs=[['last5','최근 5경기'],['last10','최근 10경기'],['last20','최근 20경기'],['month1','최근 1개월'],['month3','최근 3개월'],['month6','최근 6개월']];
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <Card style={{padding:'10px 12px'}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {tabs.map(([id,lbl])=>(
            <button key={id} onClick={()=>setPeriod(id)} style={{padding:'8px 12px',background:period===id?C.green:C.surface,border:`1px solid ${period===id?C.green:C.border}`,borderRadius:6,color:period===id?'#fff':C.muted,fontSize:13,fontWeight:period===id?600:400,cursor:'pointer',whiteSpace:'nowrap'}}>{lbl}</button>
          ))}
        </div>
      </Card>
      {filtered.length===0?(
        <Card><div style={{color:C.muted,textAlign:'center',padding:30}}>해당 기간에 경기 기록이 없습니다.</div></Card>
      ):(
        <>
          <div style={{fontSize:12,color:C.muted,padding:'0 2px'}}>{filtered.length}경기 기준</div>
          <Card>
            <ST>기간별 순위</ST>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                <thead><tr style={{color:C.muted,fontSize:11}}>
                  {['#','참가자','경기','우승','순수익','ROI','평균순위'].map(h=><th key={h} style={{padding:'7px 8px',textAlign:h==='참가자'?'left':'center',fontWeight:500,borderBottom:`1px solid ${C.border}`}}>{h}</th>)}
                </tr></thead>
                <tbody>{sorted.map((p,i)=>{
                  const s=stats[p];
                  return(
                    <tr key={p} style={{borderBottom:`1px solid ${C.border}22`}}>
                      <td style={{padding:'9px 8px',textAlign:'center'}}><span style={{display:'inline-flex',width:20,height:20,borderRadius:'50%',background:RC(i+1),color:C.bg,fontSize:10,fontWeight:700,alignItems:'center',justifyContent:'center'}}>{i+1}</span></td>
                      <td style={{padding:'9px 8px',fontWeight:600}}>{p}</td>
                      <td style={{padding:'9px 8px',textAlign:'center',color:C.muted}}>{s.games}</td>
                      <td style={{padding:'9px 8px',textAlign:'center',color:C.gold,fontWeight:600}}>{s.wins}</td>
                      <td style={{padding:'9px 8px',textAlign:'center',fontWeight:600,color:s.profit>=0?C.greenLight:C.red}}>{fmt(s.profit)}</td>
                      <td style={{padding:'9px 8px',textAlign:'center',color:s.profit>=0?C.greenLight:C.red}}>{roi(s.profit,s.totalInvested)}</td>
                      <td style={{padding:'9px 8px',textAlign:'center',color:C.muted}}>{avgRank(s.ranks)}</td>
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
          </Card>
          <Card>
            <ST>순수익 현황</ST>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {sorted.map((p,i)=>{
                const s=stats[p];
                const maxA=Math.max(...players.map(pp=>Math.abs(stats[pp].profit)),1);
                const pct=Math.abs(s.profit)/maxA;
                return(
                  <div key={p} style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:22,height:22,borderRadius:'50%',background:RC(i+1),display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:C.bg,flexShrink:0}}>{i+1}</div>
                    <div style={{width:44,fontWeight:600,fontSize:11,flexShrink:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p}</div>

                      <div style={{height:'100%',width:`${pct*100}%`,background:s.profit>=0?C.green:C.red,borderRadius:3}}/>
                    </div>
                    <div style={{width:88,textAlign:'right',fontSize:13,fontWeight:600,color:s.profit>=0?C.greenLight:C.red,flexShrink:0}}>{fmt(s.profit)}</div>

            </div>
          </Card>
        </>
      )}
    </div>
  );
}

function LeagueV({games,stats,players}){
  if(!games.length)return<Card><div style={{color:C.muted,textAlign:'center',padding:30}}>경기 기록이 없습니다.</div></Card>;
  const totInv=games.reduce((s,g)=>s+g.players.reduce((ss,p)=>ss+(1+p.rebuys)*(g.entryFee||DEFAULT_FEE),0),0);
  const totReb=games.reduce((s,g)=>s+g.players.reduce((ss,p)=>ss+p.rebuys,0),0);
  const first=games.reduce((a,b)=>a.date<b.date?a:b).date;
  const monthly={};for(const g of games){const m=g.date.slice(0,7);monthly[m]=(monthly[m]||0)+1;}
  const swing=players.map(p=>{const r=stats[p].ranks;return r.length<2?null:{name:p,v:Math.max(...r)-Math.min(...r)};}).filter(Boolean).sort((a,b)=>b.v-a.v);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>

          <Card key={l} style={{padding:'12px 14px'}}><div style={{fontSize:10,color:C.muted,marginBottom:3}}>{l}</div><div style={{fontSize:16,fontWeight:600,color:C.goldLight}}>{v}</div></Card>
        ))}

        {Object.entries(monthly).sort().map(([m,cnt])=>(
          <div key={m} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <span style={{width:65,fontSize:12,color:C.muted}}>{m}</span>
            <div style={{flex:1,height:7,background:C.border,borderRadius:4,overflow:'hidden'}}><div style={{width:`${(cnt/Math.max(...Object.values(monthly)))*100}%`,height:'100%',background:C.green,borderRadius:4}}/></div>
            <span style={{fontSize:12,color:C.goldLight,width:24,textAlign:'right'}}>{cnt}</span>
          </div>
        ))}
      </Card>
      <Card><ST>순위 변동폭</ST>
        {swing.length===0?<div style={{color:C.muted,fontSize:13}}>데이터 부족</div>:swing.map(d=><div key={d.name} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.border}22`,fontSize:13}}><span>{d.name}</span><span style={{color:C.gold,fontWeight:600}}>{d.v.toFixed(1)}</span></div>)}
      </Card>
    </div>
  );
}

function RecV({games,stats,players}){
  if(!games.length)return<Card><div style={{color:C.muted,textAlign:'center',padding:30}}>경기 기록이 없습니다.</div></Card>;
  if(!players.length)return<Card><div style={{color:C.muted,textAlign:'center',padding:30}}>플레이어가 없습니다.</div></Card>;
  const mw=[...players].sort((a,b)=>stats[b].wins-stats[a].wins)[0];
  const br=[...players].sort((a,b)=>(stats[b].profit/(stats[b].totalInvested||1))-(stats[a].profit/(stats[a].totalInvested||1)))[0];
  const mh=[...players].sort((a,b)=>(stats[b].headsupWins+stats[b].headsupLosses)-(stats[a].headsupWins+stats[a].headsupLosses))[0];
  let bg=null,bp=-Infinity,bpl=null;
  for(const g of games){const fee=g.entryFee||DEFAULT_FEE,pot=g.players.reduce((s,p)=>s+(1+p.rebuys)*fee,0);for(const p of g.players){const inv=(1+p.rebuys)*fee,pr=p.rank===1?pot-inv:-inv;if(pr>bp){bp=pr;bg=g;bpl=p.name;}}}
  let ms=0,cs=0,sp=null,cp=null;
  for(const g of [...games].sort((a,b)=>a.date.localeCompare(b.date)||a.gameNum-b.gameNum)){const w=g.players.find(p=>p.rank===1);if(!w)continue;if(w.name===cp){cs++;if(cs>ms){ms=cs;sp=w.name;}}else{cs=1;cp=w.name;if(ms===0){ms=1;sp=w.name;}}}
  const recs=[['🏆','최다 우승',`${mw} (${stats[mw].wins}회)`],['📈','최고 ROI',`${br} (${roi(stats[br].profit,stats[br].totalInvested)})`],['⚔️','최다 헤즈업 진출',`${mh} (${stats[mh].headsupWins+stats[mh].headsupLosses}회)`],['🔥','최다 연속 우승',ms>0?`${sp} (${ms}연속)`:'-'],['💰','역대 최고 단일 경기 순수익',bg?`${bpl} ${fmt(bp)} (${bg.date}/게임${bg.gameNum})`:'-']];
  return(
    <Card><ST>리그 기록실</ST>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {recs.map(([ic,l,v])=>(
          <div key={l} style={{background:C.surface,borderRadius:8,padding:'12px 14px',display:'flex',gap:12,alignItems:'center',border:`1px solid ${C.border}`}}>
            <div style={{fontSize:22}}>{ic}</div>
            <div><div style={{fontSize:10,color:C.muted,marginBottom:2,letterSpacing:1,textTransform:'uppercase'}}>{l}</div><div style={{fontSize:14,fontWeight:600,color:C.goldLight}}>{v}</div></div>
          </div>
        ))}
      </div>
    </Card>
  );
}

// ── 선택 경기 자동 정산 ───────────────────────────────────────────────────
function SettleV({games,players}){
  const[sel,setSel]=useState({});
  const[result,setResult]=useState(null);
  const[copied,setCopied]=useState(false);

  const toggleAll=()=>{
    if(Object.keys(sel).length===games.length)setSel({});
    else{const m={};games.forEach((_,i)=>m[i]=true);setSel(m);}
  };

  // 최소 송금 횟수 정산 알고리즘
  function calcSettle(selIdxs){
    // 각 플레이어별 순수익 합산
    const balance={};
    for(const idx of selIdxs){
      const g=games[idx];
      const fee=g.entryFee||DEFAULT_FEE;
      const pot=g.players.reduce((s,p)=>s+(1+p.rebuys)*fee,0);
      for(const p of g.players){
        if(!balance[p.name])balance[p.name]=0;
        const inv=(1+p.rebuys)*fee;
        const pr=p.rank===1?pot-inv:-inv;
        balance[p.name]+=pr;
      }
    }
    // 소수점 오차 제거
    for(const k of Object.keys(balance))balance[k]=Math.round(balance[k]);

    // 채권자(+) / 채무자(-) 분리 후 greedy 최소 송금
    const cred=[],debt=[];
    for(const[name,amt] of Object.entries(balance)){
      if(amt>0)cred.push({name,amt});
      else if(amt<0)debt.push({name,amt:-amt});
    }
    cred.sort((a,b)=>b.amt-a.amt);
    debt.sort((a,b)=>b.amt-a.amt);

    const txns=[];
    let ci=0,di=0;
    while(ci<cred.length&&di<debt.length){
      const c=cred[ci],d=debt[di];
      const send=Math.min(c.amt,d.amt);
      txns.push({from:d.name,to:c.name,amt:send});
      c.amt-=send;d.amt-=send;
      if(c.amt===0)ci++;
      if(d.amt===0)di++;
    }
    return{balance,txns};
  }

  const selectedIdxs=Object.entries(sel).filter(([,v])=>v).map(([k])=>Number(k));

  const doSettle=()=>{
    if(selectedIdxs.length===0){alert('정산할 경기를 선택해주세요.');return;}
    const r=calcSettle(selectedIdxs);
    setResult(r);
    setCopied(false);
  };

  const buildCopyText=()=>{
    if(!result)return'';
    const lines=['💰 포커 정산 결과',''];
    const sorted=Object.entries(result.balance).sort((a,b)=>b[1]-a[1]);
    lines.push('[ 플레이어별 합산 ]');
    for(const[name,amt] of sorted)lines.push(`  ${name}: ${amt>=0?'+':''}${amt.toLocaleString()}원`);
    lines.push('');
    if(result.txns.length===0){lines.push('✅ 정산 필요 없음 (모든 정산 완료)');}
    else{
      lines.push('[ 송금 목록 ]');
      for(const t of result.txns)lines.push(`  ${t.from} → ${t.to}: ${t.amt.toLocaleString()}원`);
    }
    lines.push('');
    lines.push(`선택 경기 ${selectedIdxs.length}개 기준`);
    return lines.join('\n');
  };

  const copy=()=>{
    navigator.clipboard.writeText(buildCopyText()).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>{});
  };

  const sortedGames=[...games].map((g,i)=>({g,i})).sort((a,b)=>b.g.date.localeCompare(a.g.date)||b.g.gameNum-a.g.gameNum);
  const allChecked=games.length>0&&selectedIdxs.length===games.length;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <Card>
        <ST>경기 선택 정산</ST>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>정산할 경기를 선택한 뒤 [선택한 경기 정산하기]를 누르세요.<br/>플레이어별 손익을 합산하고 최소 송금 경로를 계산합니다.</div>
        {games.length===0?(
          <div style={{color:C.muted,textAlign:'center',padding:30}}>경기 기록이 없습니다.</div>
        ):(
          <>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
              <input type="checkbox" checked={allChecked} onChange={toggleAll} style={{width:18,height:18,cursor:'pointer',accentColor:C.gold}}/>
              <span style={{fontSize:13,color:C.muted,flex:1}}>전체 선택 ({selectedIdxs.length}/{games.length}경기 선택됨)</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:420,overflowY:'auto',paddingRight:2}}>
              {sortedGames.map(({g,i})=>{
                const fee=g.entryFee||DEFAULT_FEE;
                const pot=g.players.reduce((s,p)=>s+(1+p.rebuys)*fee,0);
                const winner=g.players.find(p=>p.rank===1);
                return(
                  <div key={i} onClick={()=>setSel(s=>({...s,[i]:!s[i]}))}
                    style={{display:'flex',alignItems:'center',gap:12,background:sel[i]?C.green+'22':C.surface,border:`1px solid ${sel[i]?C.greenLight:C.border}`,borderRadius:8,padding:'10px 14px',cursor:'pointer',transition:'all 0.15s'}}>
                    <input type="checkbox" checked={!!sel[i]} onChange={()=>{}} style={{width:17,height:17,accentColor:C.gold,flexShrink:0,pointerEvents:'none'}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:13,fontWeight:600}}>{g.date}</span>
                        <span style={{color:C.muted,fontSize:12}}>게임 {g.gameNum}</span>
                        {fee!==DEFAULT_FEE&&<span style={{color:C.blue,fontSize:11}}>참가비 {fmtAbs(fee)}</span>}
                      </div>
                      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}}>
                        {[...g.players].sort((a,b)=>a.rank-b.rank).map(p=>(
                          <span key={p.name} style={{fontSize:11,color:p.rank===1?C.goldLight:C.muted}}>
                            {p.rank===1?'🏆':p.rank+'위'} {p.name}{p.rebuys>0?` ↻${p.rebuys}`:''}
                          </span>
                        ))}
                      </div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontSize:12,color:C.muted}}>팟</div>
                      <div style={{fontSize:13,fontWeight:600,color:C.goldLight}}>{fmtAbs(pot)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:14}}>
              <Btn onClick={doSettle} style={{width:'100%',padding:'14px',fontSize:15}}>
                💳 선택한 경기 정산하기 ({selectedIdxs.length}경기)
              </Btn>
            </div>
          </>
        )}
      </Card>

      {result&&(
        <Card>
          <ST>정산 결과</ST>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:C.muted,marginBottom:10}}>플레이어별 합산 손익 ({selectedIdxs.length}경기)</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {Object.entries(result.balance).sort((a,b)=>b[1]-a[1]).map(([name,amt])=>(
                <div key={name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:C.surface,borderRadius:7,padding:'9px 12px',border:`1px solid ${C.border}`}}>
                  <span style={{fontWeight:600,fontSize:14}}>{name}</span>
                  <span style={{fontWeight:700,fontSize:15,color:amt>=0?C.greenLight:C.red}}>{amt>=0?'+':''}{amt.toLocaleString()}원</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
            <div style={{fontSize:12,color:C.muted,marginBottom:10}}>💸 송금 목록 (최소 {result.txns.length}회 송금)</div>
            {result.txns.length===0?(
              <div style={{background:C.green+'22',border:`1px solid ${C.green}44`,borderRadius:8,padding:'14px',textAlign:'center',color:C.greenLight,fontWeight:600}}>✅ 모든 정산이 완료되었습니다!</div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {result.txns.map((t,i)=>(
                  <div key={i} style={{background:C.surface,borderRadius:8,padding:'12px 14px',border:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontWeight:600,color:C.red,minWidth:40}}>{t.from}</span>
                    <span style={{color:C.muted,fontSize:20}}>→</span>
                    <span style={{fontWeight:600,color:C.greenLight,flex:1}}>{t.to}</span>

                  </div>
                ))}

          <Btn onClick={copy} variant={copied?'ghost':'gold'} style={{width:'100%',padding:'12px',fontSize:14}}>
            {copied?'✅ 복사 완료!':'📋 단톡방 복사용 텍스트 복사'}

          {copied&&(

                  if(navigator.clipboard){
                    navigator.clipboard.writeText(json)
                      .then(()=>alert('다운로드를 지원하지 않는 환경입니다.\n데이터를 클립보드에 복사했습니다.\n메모장 등에 붙여넣기하여 저장하세요.'))
                      .catch(()=>alert('내보내기에 실패했습니다.'));
                  }else{alert('내보내기에 실패했습니다.');}
                };
                reader.readAsDataURL(blob);
              }catch(e){alert('내보내기 오류: '+e.message);}
            }} style={{padding:'10px 20px',fontSize:14}}>기록 내보내기</Btn>
          </div>

          {/* 가져오기 */}
          <div style={{background:C.surface,borderRadius:8,padding:'14px',border:`1px solid ${C.border}`}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>📥 복원 (가져오기)</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:10}}>저장해둔 파일을 불러옵니다.<br/>⚠️ 현재 기록이 파일 내용으로 교체됩니다.</div>
            {importConfirm?(
              /* 인라인 가져오기 확인 UI — confirm() 대체 */
              <div style={{background:C.card,border:`1px solid ${C.gold}44`,borderRadius:8,padding:'12px'}}>
                <div style={{fontSize:13,fontWeight:600,color:C.gold,marginBottom:4}}>📂 파일을 불러올까요?</div>
                <div style={{fontSize:12,color:C.muted,marginBottom:10}}>
                  경기 {importConfirm.games.length}개 · 플레이어 {importConfirm.players.length}명<br/>
                  현재 그룹 <span style={{color:C.text,fontWeight:600}}>{currentGroup?currentGroup.name:'?'}</span>의 기록이 교체됩니다.
                </div>
                <div style={{display:'flex',gap:8}}>
                  <Btn onClick={()=>{
                    const data=importConfirm;
                    loadingRef.current=true;
                    setGames(data.games);
                    setPlayers(data.players);
                    if(data.defaultFee)setDefaultFee(data.defaultFee);
                    setTimeout(()=>{
                      if(currentGroup){saveGroupData(currentGroup.id,{games:data.games,players:data.players,defaultFee:data.defaultFee||DEFAULT_FEE});}
                      loadingRef.current=false;
                      setImportConfirm(null);
                      alert('가져오기 완료!');
                    },80);
                  }} style={{flex:1,padding:'8px',fontSize:13}}>가져오기 확인</Btn>
                  <Btn variant="ghost" onClick={()=>setImportConfirm(null)} style={{flex:1,padding:'8px',fontSize:13}}>취소</Btn>
                </div>
              </div>
            ):(
              <label style={{display:'inline-block',padding:'10px 20px',background:C.green,color:'#fff',borderRadius:7,fontSize:14,fontWeight:600,cursor:'pointer'}}>
                파일 가져오기
                {/* accept 속성 제거 — 스윙투앱 WebView에서 accept=".json"이 카메라만 열리는 버그 우회 */}
                <input type="file" style={{display:'none'}} onChange={e=>{
                  const file=e.target.files[0];
                  if(!file)return;
                  const reader=new FileReader();
                  reader.onload=ev=>{
                    try{
                      const data=JSON.parse(ev.target.result);
                      if(!data.games||!data.players){alert('올바른 백업 파일이 아닙니다.\n(포커리그에서 내보낸 .json 파일을 선택해주세요)');return;}
                      setImportConfirm(data); // 확인 UI 표시
                    }catch{alert('파일을 읽을 수 없습니다.\n포커리그에서 내보낸 JSON 파일인지 확인해주세요.');}
                  };
                  reader.readAsText(file);
                  e.target.value='';
                }}/>
              </label>
            )}
          </div>

          {deleteConfirm?(
            <div style={{background:C.surface,borderRadius:8,padding:'14px',border:`1px solid ${C.red}`}}>
              <div style={{fontSize:13,fontWeight:600,color:C.red,marginBottom:4}}>⚠️ 정말 삭제할까요?</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:10}}>모든 경기 기록이 삭제됩니다. 플레이어 목록은 유지됩니다.</div>
              <div style={{display:'flex',gap:8}}>
                <Btn variant="danger" onClick={()=>{setGames([]);setDeleteConfirm(false);}} style={{flex:1,padding:'8px',fontSize:13}}>삭제 확인</Btn>
                <Btn variant="ghost" onClick={()=>setDeleteConfirm(false)} style={{flex:1,padding:'8px',fontSize:13}}>취소</Btn>
              </div>
            </div>
          ):(
            <Btn variant="danger" onClick={()=>setDeleteConfirm(true)} style={{alignSelf:'flex-start'}}>경기 기록 전체 삭제</Btn>
          )}
        </div>
      </Card>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
